name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.12.0]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run environment check
        run: npm run validate:env

      - name: Verify Project Adrasteia baseline
        run: npm run verify:adrasteia-baseline

      - name: Build all packages
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Build testbench
        run: npm run build -w @ananke/testbench

      - name: Run tests
        run: npm test

      - name: Run Adrasteia adapter conformance tests
        run: npm run test:adrasteia:conformance

      - name: Run scenario benchmark
        run: npm run test:bench

      - name: Run filesystem MCP demo
        run: npm run demo:filesystem:run

      - name: Smoke test standalone gateway
        run: npm run test:gateway:smoke

      - name: Check patch whitespace
        run: git diff --check

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports-node-${{ matrix.node-version }}
          path: validation-reports/
          if-no-files-found: warn
